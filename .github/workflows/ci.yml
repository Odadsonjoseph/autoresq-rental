name: CI Quality Gate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality-gate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: false

      - name: Type Check
        run: npm run typecheck --if-present || npx tsc --noEmit --pretty 2>/dev/null || true

      - name: Run Tests
        run: npm test --if-present -- --passWithNoTests 2>/dev/null || true

      - name: Build Check
        run: npm run build --if-present
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_key

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # Check for common secret patterns
          if grep -rn "sbp_\|sk_live_\|pk_live_\|SUPABASE_SERVICE_ROLE_KEY=\"[a-zA-Z]" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.env" . 2>/dev/null | grep -v node_modules | grep -v ".env.example"; then
            echo "⚠️  Potential hardcoded secrets found!"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "::error::Hardcoded secrets detected. Use environment variables instead."
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Audit dependencies
        run: npm audit --production 2>/dev/null || true
